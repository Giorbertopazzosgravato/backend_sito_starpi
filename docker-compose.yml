version: '3.8'

services:
  db:
    image: postgres:18.3-alpine
    restart: always
    env_file:
      - ./database/db.env
    volumes:
      # Saves the database data permanently on your host machine
      - pgdata:/var/lib/postgresql/data
      # Mounts your backups folder so the init script can find latest.backup
      - ./database/backups:/docker-entrypoint-initdb.d/backups
      # Mounts the script we just wrote
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  backend:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - ./database/db.env
    volumes:
      # We create a persistent folder specifically for your .txt file
      - newsletter_data:/usr/src/app/data

  web:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # Mounts the routing rules
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      # Mounts your static folders directly into Nginx
      - ./dist:/usr/share/nginx/html/dist
      - ./foto:/usr/share/nginx/html/foto
      - ./news:/usr/share/nginx/html/news

volumes:
  pgdata:
  newsletter_data: