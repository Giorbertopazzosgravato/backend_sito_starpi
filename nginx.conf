server {
    listen 80;
    server_name starpi.eu www.starpi.eu;

    # 1. Forward Database GET requests to Rust
    location /database/ {
        proxy_pass http://backend:7878;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. Forward the Newsletter POST request to Rust
    location /IscrizioneGiornale {
        proxy_pass http://backend:7878;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 3. Serve the main website (dist folder)
    location / {
        root /usr/share/nginx/html/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 4. Serve the photos
    location /foto/ {
        # ROOT punta alla cartella genitore.
        # Nginx aggiungerà "/foto/..." in automatico
        root /usr/share/nginx/html;

        # Se non trova l'URI esatto, restituisce download.jpg
        try_files $uri /foto/download.jpg;
    }

    # 5. Serve the news PDFs
    location /news/ {
        alias /usr/share/nginx/html/news/;
    }
}